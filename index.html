<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="名片掃描">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>名片掃描 v3</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: #f5f5f7; color: #1d1d1f; min-height: 100vh; padding-bottom: 40px; }
.header { background: #fff; padding: 16px 20px 12px; border-bottom: 0.5px solid rgba(0,0,0,0.12); }
.header h1 { font-size: 20px; font-weight: 600; }
.header p { font-size: 13px; color: #6e6e73; margin-top: 2px; }
.content { padding: 16px; max-width: 480px; margin: 0 auto; }
.upload-zone { background: #fff; border-radius: 16px; border: 1.5px dashed #c7c7cc; padding: 36px 20px; text-align: center; cursor: pointer; margin-bottom: 16px; }
.upload-zone:active { background: #f0f0f5; }
.cam-icon { width: 56px; height: 56px; background: #007aff; border-radius: 14px; display: flex; align-items: center; justify-content: center; margin: 0 auto 12px; }
.upload-zone .main-text { font-size: 17px; font-weight: 600; color: #1d1d1f; margin-bottom: 4px; }
.upload-zone .sub-text { font-size: 13px; color: #6e6e73; }
.status-bar { font-size: 14px; color: #6e6e73; text-align: center; padding: 6px 0 10px; min-height: 32px; display: flex; align-items: center; justify-content: center; gap: 8px; }
.spinner { width: 16px; height: 16px; border: 2px solid #e5e5ea; border-top-color: #007aff; border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0; }
@keyframes spin { to { transform: rotate(360deg); } }
.contact-card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 16px; display: none; }
.contact-header { background: #007aff; padding: 20px 16px 16px; display: flex; align-items: center; gap: 14px; }
.avatar { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.25); display: flex; align-items: center; justify-content: center; font-size: 20px; font-weight: 600; color: #fff; flex-shrink: 0; }
.contact-header-info { flex: 1; min-width: 0; }
.contact-name { font-size: 18px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.contact-sub { font-size: 13px; color: rgba(255,255,255,0.8); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.field-list { padding: 0 16px; }
.field { display: flex; align-items: center; gap: 12px; padding: 11px 0; border-bottom: 0.5px solid #f2f2f7; }
.field:last-child { border-bottom: none; }
.field-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.field-inner { flex: 1; min-width: 0; }
.field-label { font-size: 11px; color: #6e6e73; margin-bottom: 1px; }
.field-input { width: 100%; border: none; outline: none; font-size: 15px; color: #1d1d1f; background: transparent; font-family: inherit; }
.field-input::placeholder { color: #c7c7cc; }
.save-btn { width: 100%; background: #34c759; color: #fff; border: none; border-radius: 12px; padding: 15px; font-size: 17px; font-weight: 600; cursor: pointer; font-family: inherit; display: none; align-items: center; justify-content: center; gap: 8px; margin-bottom: 10px; }
.save-btn:active { opacity: 0.85; }
.rescan-btn { width: 100%; background: #f5f5f7; color: #007aff; border: none; border-radius: 12px; padding: 14px; font-size: 16px; font-weight: 500; cursor: pointer; font-family: inherit; display: none; margin-bottom: 10px; }
.rescan-btn:active { opacity: 0.7; }
.hint { font-size: 12px; color: #6e6e73; text-align: center; line-height: 1.7; display: none; }
.install-tip { background: #e8f0fe; border-radius: 12px; padding: 11px 14px; margin-bottom: 14px; display: none; }
.install-tip p { font-size: 13px; color: #1a56c4; line-height: 1.6; }
</style>
</head>
<body>
<div class="header">
  <h1>名片掃描</h1>
  <p>拍照辨識，直接加入聯絡人</p>
</div>
<div class="content">
  <div class="install-tip" id="install-tip">
    <p>點右下角 <strong>分享</strong> → <strong>加入主畫面</strong>，安裝為 App</p>
  </div>
  <div class="upload-zone" id="upload-zone" onclick="document.getElementById('file-input').click()">
    <div class="cam-icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </div>
    <p class="main-text">拍攝名片</p>
    <p class="sub-text">或點此從相簿選擇，支援中英文</p>
    <input type="file" id="file-input" accept="image/*" capture="environment" style="display:none">
  </div>
  <div class="status-bar" id="status-bar"></div>
  <div class="contact-card" id="contact-card">
    <div class="contact-header">
      <div class="avatar" id="avatar">?</div>
      <div class="contact-header-info">
        <div class="contact-name" id="header-name">—</div>
        <div class="contact-sub" id="header-sub">—</div>
      </div>
    </div>
    <div class="field-list">
      <div class="field">
        <div class="field-dot" style="background:#007aff"></div>
        <div class="field-inner"><div class="field-label">電話</div><input class="field-input" id="f-tel" type="tel" placeholder="未辨識到"></div>
      </div>
      <div class="field">
        <div class="field-dot" style="background:#5856d6"></div>
        <div class="field-inner"><div class="field-label">Email</div><input class="field-input" id="f-email" type="email" placeholder="未辨識到"></div>
      </div>
      <div class="field">
        <div class="field-dot" style="background:#ff9500"></div>
        <div class="field-inner"><div class="field-label">公司</div><input class="field-input" id="f-org" type="text" placeholder="未辨識到"></div>
      </div>
      <div class="field">
        <div class="field-dot" style="background:#ff9500"></div>
        <div class="field-inner"><div class="field-label">職稱</div><input class="field-input" id="f-title" type="text" placeholder="未辨識到"></div>
      </div>
      <div class="field">
        <div class="field-dot" style="background:#34c759"></div>
        <div class="field-inner"><div class="field-label">地址</div><input class="field-input" id="f-addr" type="text" placeholder="未辨識到"></div>
      </div>
      <div class="field">
        <div class="field-dot" style="background:#30b0c7"></div>
        <div class="field-inner"><div class="field-label">網站</div><input class="field-input" id="f-url" type="url" placeholder="未辨識到"></div>
      </div>
    </div>
  </div>
  <button class="save-btn" id="save-btn" onclick="saveContact()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    加入聯絡人
  </button>
  <button class="rescan-btn" id="rescan-btn" onclick="resetAll()">重新掃描</button>
  <p class="hint" id="hint">跳出「新增聯絡人」後，點右上角<strong>完成</strong>即儲存</p>
</div>
<script>
const WORKER_URL = 'https://card-api.chenminche.workers.dev';
const fileInput = document.getElementById('file-input');
const statusBar = document.getElementById('status-bar');
const contactCard = document.getElementById('contact-card');
const saveBtn = document.getElementById('save-btn');
const rescanBtn = document.getElementById('rescan-btn');
const hint = document.getElementById('hint');
let currentName = '';

if (window.navigator.standalone === false) {
  document.getElementById('install-tip').style.display = 'block';
}

fileInput.addEventListener('change', e => {
  const file = e.target.files[0];
  if (!file) return;
  setStatus('loading', '處理圖片中...');
  compressImage(file, (base64, mimeType) => {
    analyzeCard(base64, mimeType);
  });
});

function compressImage(file, callback) {
  const img = new Image();
  const url = URL.createObjectURL(file);
  img.onload = () => {
    const MAX = 1200;
    let w = img.width, h = img.height;
    if (w > MAX || h > MAX) {
      if (w > h) { h = Math.round(h * MAX / w); w = MAX; }
      else { w = Math.round(w * MAX / h); h = MAX; }
    }
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(img, 0, 0, w, h);
    const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
    URL.revokeObjectURL(url);
    callback(dataUrl.split(',')[1], 'image/jpeg');
  };
  img.src = url;
}

async function analyzeCard(base64Data, mimeType) {
  setStatus('loading', '辨識中...');
  contactCard.style.display = 'none';
  saveBtn.style.display = 'none';
  rescanBtn.style.display = 'none';
  hint.style.display = 'none';
  try {
    const resp = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ imageBase64: base64Data, mimeType: mimeType })
    });
    const text = await resp.text();
    const info = JSON.parse(text.replace(/```json|```/g, '').trim());

    currentName = info.name || '';
    document.getElementById('f-tel').value = info.tel || '';
    document.getElementById('f-email').value = info.email || '';
    document.getElementById('f-org').value = info.org || '';
    document.getElementById('f-title').value = info.title || '';
    document.getElementById('f-addr').value = info.addr || '';
    document.getElementById('f-url').value = info.url || '';
    document.getElementById('avatar').textContent = currentName ? currentName.slice(0,1) : '?';
    document.getElementById('header-name').textContent = currentName || '（未辨識）';
    document.getElementById('header-sub').textContent = [info.title, info.org].filter(Boolean).join(' · ') || '—';

    setStatus('', '');
    contactCard.style.display = 'block';
    saveBtn.style.display = 'flex';
    rescanBtn.style.display = 'block';
    hint.style.display = 'block';
  } catch(err) {
    setStatus('error', '辨識失敗，請再試一次');
    rescanBtn.style.display = 'block';
  }
}

function setStatus(type, msg) {
  statusBar.innerHTML = type === 'loading' ? `<div class="spinner"></div><span>${msg}</span>` : msg;
}

function saveContact() {
  const tel = document.getElementById('f-tel').value.trim();
  const email = document.getElementById('f-email').value.trim();
  const org = document.getElementById('f-org').value.trim();
  const title = document.getElementById('f-title').value.trim();
  const addr = document.getElementById('f-addr').value.trim();
  const url = document.getElementById('f-url').value.trim();
  let vcf = 'BEGIN:VCARD\nVERSION:3.0\n';
  if (currentName) vcf += `FN:${currentName}\nN:${currentName};;;\n`;
  if (org) vcf += `ORG:${org}\n`;
  if (title) vcf += `TITLE:${title}\n`;
  if (tel) vcf += `TEL;TYPE=WORK,VOICE:${tel}\n`;
  if (email) vcf += `EMAIL;TYPE=WORK:${email}\n`;
  if (addr) vcf += `ADR;TYPE=WORK:;;${addr};;;;\n`;
  if (url) vcf += `URL:${url}\n`;
  vcf += 'END:VCARD';
  const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (currentName || 'contact') + '.vcf';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

function resetAll() {
  fileInput.value = '';
  statusBar.textContent = '';
  contactCard.style.display = 'none';
  saveBtn.style.display = 'none';
  rescanBtn.style.display = 'none';
  hint.style.display = 'none';
  currentName = '';
}
</script>
</body>
</html>
